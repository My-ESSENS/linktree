    <style>
        :root {
            --bg-start: #f8f6f1;
            --bg-end: #eae6db;
            --primary-text: #1a1a1a;
            --secondary-text: #606060;
            --btn-bg: #2d2d2d;
            --btn-text: #ffffff;
            --btn-hover-bg: #1a1a1a;
            --accent: #bda180; /* Culoarea stilizată pentru logouri */
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
            --shadow-premium: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--primary-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px 20px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .main-wrapper {
            width: 100%;
            max-width: 480px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-header {
            margin-bottom: 30px; /* Redus puțin pentru a face loc iconițelor */
            width: 100%;
        }

        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px auto;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
            box-shadow: var(--shadow-premium);
        }
        
        .avatar-container::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 1px solid var(--accent);
            opacity: 0.5;
        }

        .profile-name {
            font-family: var(--font-display);
            font-size: 38px;
            font-weight: 500;
            font-style: italic;
            color: var(--primary-text);
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .profile-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            font-weight: 600;
        }

        /* --- Secțiunea NOUĂ: Social Icons --- */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 35px;
        }

        .social-link {
            color: var(--accent); /* Logourile preiau culoarea gold mat */
            font-size: 24px;
            transition: var(--transition);
            text-decoration: none;
        }

        .social-link:hover {
            color: var(--primary-text);
            transform: translateY(-3px);
        }

        /* --- Restul stilurilor --- */
        .links-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 50px;
        }

        .link-btn {
            display: block;
            width: 100%;
            padding: 20px 24px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: var(--transition);
            box-shadow: var(--shadow-premium);
            border: 1px solid transparent;
        }

        .link-btn:hover {
            background-color: var(--btn-hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.12);
            border-color: var(--accent);
        }
        
        .link-btn.featured {
            background-color: #fff;
            color: #1a1a1a;
            border: 1px solid var(--accent);
        }
        
        .link-btn.featured:hover {
            background-color: var(--bg-start);
        }

        .contact-footer {
            margin-top: auto;
            width: 100%;
            padding-top: 30px;
            border-top: 1px solid rgba(0,0,0,0.05);
            text-align: center;
        }

        .contact-info {
            font-size: 13px;
            color: var(--secondary-text);
            line-height: 2;
        }
        
        .contact-info a {
            color: var(--primary-text);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
